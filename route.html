<!DOCTYPE html>
<html>
<head>
    <title>Маршрут на карте</title>
    <meta charset="utf-8" />
    <!-- Подключаем API Яндекс.Карт с вашим ключом -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ffa3ea6c-3972-48b1-8878-7e3d9c03384a&lang=ru_RU" type="text/javascript"></script>
    <style>
        /* Стили для карты */
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script type="text/javascript">
        // Функция получения параметров из URL
        function getParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        ymaps.ready(function () {
            // Получаем координаты точек из URL-параметров
            // Пример: ?lat1=55.75&lon1=37.61&lat2=55.45&lon2=37.36
            var lat1 = parseFloat(getParam('lat1')) || 55.76;
            var lon1 = parseFloat(getParam('lon1')) || 37.64;
            var lat2 = parseFloat(getParam('lat2')) || 55.45;
            var lon2 = parseFloat(getParam('lon2')) || 37.36;

            // Создаем карту
            var myMap = new ymaps.Map('map', {
                center: [55.76, 37.64],
                zoom: 10,
                controls: ['routeButtonControl'] // Кнопка для построения маршрута
            });

            // Создаем мультимаршрут
            var multiRoute = new ymaps.multiRouter.MultiRoute({
                referencePoints: [
                    [lat1, lon1], // Точка А (координаты)
                    [lat2, lon2]  // Точка Б (координаты)
                ],
                params: {
                    // Тип маршрута: 'auto' (авто), 'masstransit' (общественный), 'pedestrian' (пешком)
                    routingMode: 'auto'
                }
            }, {
                boundsAutoApply: true, // Автоматически подогнать карту под маршрут
                // Отключаем возможность перетаскивать точки маршрута (опционально)
                editorDraw: false
            });

            // Добавляем маршрут на карту
            myMap.geoObjects.add(multiRoute);
        });
    </script>
</body>
</html>
