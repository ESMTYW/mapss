<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Маршрут</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=5b3b6a23-5216-4e4d-9bce-82185415563c&lang=ru_RU"></script>
    <style>
        html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
        #info {
            position: absolute; bottom: 20px; left: 20px;
            background: white; padding: 10px 20px;
            border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-family: Arial; font-size: 14px; z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info">Загрузка...</div>

    <script>
        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        ymaps.ready(function() {
            var lat1 = parseFloat(getParam('lat1')) || 55.76;
            var lon1 = parseFloat(getParam('lon1')) || 37.64;
            var lat2 = parseFloat(getParam('lat2')) || 55.45;
            var lon2 = parseFloat(getParam('lon2')) || 37.36;

            var map = new ymaps.Map('map', {
                center: [(lat1+lat2)/2, (lon1+lon2)/2],
                zoom: 10,
                controls: ['zoomControl']
            });

            var route = new ymaps.multiRouter.MultiRoute({
                referencePoints: [
                    [lat1, lon1],
                    [lat2, lon2]
                ],
                params: { routingMode: 'auto' }
            }, {
                boundsAutoApply: true,
                editorDraw: false
            });

            map.geoObjects.add(route);

            route.model.events.add('requestsuccess', function() {
                var activeRoute = route.getActiveRoute();
                if (activeRoute) {
                    var distance = activeRoute.properties.get('distance').text;
                    var duration = activeRoute.properties.get('duration').text;
                    document.getElementById('info').innerHTML =
                        '🚗 Расстояние: ' + distance + ' | ⏱️ Время: ' + duration;
                }
            });

            route.model.events.add('requestfail', function() {
                document.getElementById('info').innerHTML =
                    '❌ Ошибка: не удалось построить маршрут. Проверьте координаты.';
            });
        });
    </script>
</body>
</html>
