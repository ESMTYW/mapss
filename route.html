<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маршрут на Яндекс.Картах</title>
    <!-- Подключаем API Яндекс.Карт с вашим ключом -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ffa3ea6c-3972-48b1-8878-7e3d9c03384a&lang=ru_RU" type="text/javascript"></script>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info">Загрузка маршрута...</div>

    <script type="text/javascript">
        // Функция для получения параметров из URL
        function getParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        ymaps.ready(function () {
            // Читаем координаты из параметров URL
            const lat1 = parseFloat(getParam('lat1')) || 55.76;
            const lon1 = parseFloat(getParam('lon1')) || 37.64;
            const lat2 = parseFloat(getParam('lat2')) || 55.45;
            const lon2 = parseFloat(getParam('lon2')) || 37.36;

            // Создаём карту
            const centerLat = (lat1 + lat2) / 2;
            const centerLon = (lon1 + lon2) / 2;
            const myMap = new ymaps.Map('map', {
                center: [centerLat, centerLon],
                zoom: 10,
                controls: ['zoomControl', 'fullscreenControl']
            });

            // Создаём мультимаршрут
            const multiRoute = new ymaps.multiRouter.MultiRoute({
                referencePoints: [
                    [lat1, lon1],
                    [lat2, lon2]
                ],
                params: {
                    routingMode: 'auto'
                }
            }, {
                boundsAutoApply: true,
                editorDraw: false
            });

            myMap.geoObjects.add(multiRoute);

            // Показываем расстояние и время после построения маршрута
            multiRoute.model.events.add('requestsuccess', function () {
                const activeRoute = multiRoute.getActiveRoute();
                if (activeRoute) {
                    const distance = activeRoute.properties.get('distance').text;
                    const duration = activeRoute.properties.get('duration').text;
                    document.getElementById('info').innerHTML =
                        `🚗 <b>Расстояние:</b> ${distance} &nbsp;|&nbsp; ⏱️ <b>Время:</b> ${duration}`;
                }
            });

            multiRoute.model.events.add('requestfail', function () {
                document.getElementById('info').innerHTML =
                    '❌ Не удалось построить маршрут. Проверьте координаты.';
            });
        });
    </script>
</body>
</html>
